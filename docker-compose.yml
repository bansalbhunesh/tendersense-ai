services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tendersense
      POSTGRES_PASSWORD: tendersense
      POSTGRES_DB: tendersense
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  ai:
    build: ./ai-service
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      # ANTHROPIC_API_KEY: ""

  api:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://tendersense:tendersense@db:5432/tendersense?sslmode=disable
      AI_SERVICE_URL: http://ai:8081
      JWT_SECRET: change-me
      PORT: "8080"
    depends_on:
      - db
      - ai
    volumes:
      - uploads:/app/data/uploads

volumes:
  pgdata:
  uploads:
