services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tendersense
      POSTGRES_PASSWORD: tendersense
      POSTGRES_DB: tendersense
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tendersense -d tendersense"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  ai-service:
    build: ./ai-service
    mem_limit: 3g
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - DATA_DIR=/app/data/uploads
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173}
      - EVALUATE_CACHE_TTL_SECONDS=${EVALUATE_CACHE_TTL_SECONDS:-900}
      - OCR_CACHE_TTL_SECONDS=${OCR_CACHE_TTL_SECONDS:-86400}
      - CRITERIA_CACHE_TTL_SECONDS=${CRITERIA_CACHE_TTL_SECONDS:-7200}
      - GIT_SHA=${GIT_SHA:-}
      # Bharat-first: language and sovereign-mode controls
      - LLM_BACKEND=${LLM_BACKEND:-anthropic}
      - TRANSLATION_BACKEND=${TRANSLATION_BACKEND:-disabled}
      - OCR_LANGS=${OCR_LANGS:-eng}
      - BHASHINI_USER_ID=${BHASHINI_USER_ID:-}
      - BHASHINI_API_KEY=${BHASHINI_API_KEY:-}
      - BHASHINI_PIPELINE_ID=${BHASHINI_PIPELINE_ID:-}
      - BHASHINI_INFERENCE_URL=${BHASHINI_INFERENCE_URL:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - uploads:/app/data/uploads
    depends_on:
      redis:
        condition: service_healthy

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://tendersense:tendersense@db:5432/tendersense?sslmode=disable
      - REDIS_URL=redis://redis:6379/1
      - AI_SERVICE_URL=http://ai-service:8081
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5173}
      - ALLOWED_ORIGIN_REGEX=${ALLOWED_ORIGIN_REGEX:-}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=8080
      - DATA_DIR=/app/data/uploads
      - GIT_SHA=${GIT_SHA:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESET_EMAIL_FROM=${RESET_EMAIL_FROM:-}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:5173}
      - ALLOW_INSECURE_RESET_TOKEN_RESPONSE=${ALLOW_INSECURE_RESET_TOKEN_RESPONSE:-false}
      # Optional object storage (see docs/DEPLOYMENT.md). Example with compose profile `objectstore`:
      # - S3_ENDPOINT=minio:9000
      # - S3_USE_SSL=false
      # - S3_ACCESS_KEY=minio
      # - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      # - S3_BUCKET=tendersense
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - uploads:/app/data/uploads

  # Optional S3-compatible store (enable with: docker compose --profile objectstore up)
  minio:
    image: minio/minio:latest
    profiles: ["objectstore"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set when using the objectstore profile (see .env.example)}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  uploads:
  miniodata:
